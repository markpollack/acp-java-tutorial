# Disable banner - stdout is reserved for the JSON-RPC protocol
spring.main.banner-mode=off

# stdio agent: no web server, keep the JVM alive
spring.main.web-application-type=none
spring.main.keep-alive=true

# Spring AI - Anthropic. The key is read from the ANTHROPIC_API_KEY env var.
# To switch providers, replace the spring-ai-starter-model-* dependency and the
# spring.ai.<provider>.* properties here - the agent code does not change.
spring.ai.anthropic.api-key=${ANTHROPIC_API_KEY}
spring.ai.anthropic.chat.options.model=claude-sonnet-4-6
spring.ai.anthropic.chat.options.max-tokens=1024
